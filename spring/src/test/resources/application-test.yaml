server:
  port: 8080

spring:
  application:
    name: stocksy

  datasource:
    url:  jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

  redis:
    host: localhost
    port: 6379

  cache:
    type: redis
    redis:
      cache-null-values: false

management:
  endpoints:
    web:
      exposure.include: health,info
      base-path: /vekrest/vekclient/actuator

    health:
      show-details: never

  endpoint.health.show-details: never

